name: Actualizar Mundial 2026

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: mundial-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar actualizador (Wikipedia + ESPN + conciliación)
        run: python actualizar_mundial.py

      - name: Volcar discrepancias pendientes al resumen (si hay)
        if: always()
        run: |
          if [ -s discrepancias.json ] && [ "$(cat discrepancias.json)" != "[]" ]; then
            {
              echo "### ⚠️ Hay discrepancias pendientes entre Wikipedia y ESPN"
              echo '```'
              python resolver_discrepancia.py --listar
              echo '```'
              echo ""
              echo "Resuélvelas desde **Actions → \"Resolver discrepancia\" → Run workflow**."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit y push si hay cambios
        run: |
          git config user.name "mundial-bot"
          git config user.email "mundial-bot@users.noreply.github.com"
          git add matches.json estado_reconciliacion.json discrepancias.json \
                  goleadores_por_partido.json docs/data.json
          git diff --cached --quiet || git commit -m "Actualización automática $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
