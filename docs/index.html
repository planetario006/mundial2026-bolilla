<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mundial 2026 · La Bolilla</title>
<meta name="theme-color" content="#0B1F14">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch:#0B1F14;
    --turf:#13311F;
    --turf-soft:#16391F;
    --line:#28492F;
    --chalk:#F2F0E6;
    --chalk-dim:#A9B8AC;
    --amber:#FFB627;
    --amber-dim:#8a6418;
    --win:#4ADE80;
    --loss:#FB5B4D;
    --plate:#081209;
    --radius:14px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--pitch); color:var(--chalk);}
  body{
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    padding-bottom: calc(78px + var(--safe-bottom));
    background-image:
      radial-gradient(ellipse 600px 300px at 50% -80px, rgba(255,182,39,0.08), transparent 70%),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 2px, transparent 2px, transparent 42px);
  }
  h1,h2,h3,.display{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.03em;}
  .mono{font-family:'JetBrains Mono',monospace; font-variant-numeric: tabular-nums;}

  /* ---------- Header ---------- */
  header.top{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg, var(--pitch) 70%, rgba(11,31,20,0.85));
    backdrop-filter:saturate(140%) blur(6px);
    padding:16px 18px 12px;
    border-bottom:1px solid var(--line);
  }
  .top-row{display:flex; align-items:flex-end; justify-content:space-between; gap:10px;}
  .brand h1{font-size:22px; margin:0; color:var(--chalk); line-height:1;}
  .brand .sub{font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:0.18em; color:var(--amber); margin-top:3px;}
  .updated-pill{
    font-size:10.5px; color:var(--chalk-dim); background:var(--turf);
    border:1px solid var(--line); border-radius:20px; padding:5px 10px;
    white-space:nowrap; display:flex; align-items:center; gap:5px;
  }
  .updated-pill .dot{width:6px; height:6px; border-radius:50%; background:var(--win); box-shadow:0 0 6px var(--win);}

  main{max-width:560px; margin:0 auto; padding:14px 14px 10px;}
  .view{display:none; animation:fade .25s ease;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  .section-title{font-size:13px; color:var(--chalk-dim); letter-spacing:0.1em; margin:18px 2px 8px; display:flex; justify-content:space-between; align-items:center;}

  /* ---------- Scoreboard digit (signature element) ---------- */
  .scorebox{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-variant-numeric: tabular-nums;
    background:var(--plate); border-radius:6px; padding:4px 9px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), inset 0 2px 5px rgba(0,0,0,0.55);
    min-width:2.6em; text-align:center; display:inline-block;
  }
  .scorebox.pos{color:var(--win); text-shadow:0 0 10px rgba(74,222,128,0.35);}
  .scorebox.neg{color:var(--loss); text-shadow:0 0 10px rgba(251,91,77,0.3);}
  .scorebox.zero{color:var(--chalk-dim);}
  .scorebox.amber{color:var(--amber); text-shadow:0 0 10px rgba(255,182,39,0.3);}

  /* ---------- Cards / rows ---------- */
  .card{background:var(--turf); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .card + .card{margin-top:10px;}

  .rank-row{display:flex; align-items:center; gap:11px; padding:11px 12px; cursor:pointer;}
  .rank-row + .rank-row{border-top:1px solid var(--line);}
  .rank-row summary{list-style:none; display:flex; align-items:center; gap:11px; width:100%;}
  .rank-row summary::-webkit-details-marker{display:none;}
  .rank-num{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; color:var(--chalk-dim); width:22px; text-align:right; flex-shrink:0;}
  .rank-num.top3{color:var(--amber);}
  .rank-team{flex:1; min-width:0;}
  .rank-team .name{font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .rank-team .tags{font-size:11px; color:var(--chalk-dim); margin-top:1px;}
  details.rank-row{padding:0;}
  details.rank-row > summary{padding:11px 12px;}
  .breakdown{padding:0 14px 14px; font-size:12.5px; color:var(--chalk-dim);}
  .breakdown-grid{display:grid; grid-template-columns:1fr auto; gap:6px 10px; padding-top:8px; border-top:1px solid var(--line);}
  .breakdown-grid div:nth-child(odd){color:var(--chalk-dim);}
  .breakdown-grid div:nth-child(even){text-align:right; font-family:'JetBrains Mono',monospace; color:var(--chalk);}

  .tag{display:inline-block; background:var(--turf-soft); border:1px solid var(--line); border-radius:5px; padding:1px 6px; font-size:10.5px; color:var(--chalk-dim); margin-right:5px;}

  /* ---------- Partidos ---------- */
  .date-head{font-size:11.5px; color:var(--chalk-dim); letter-spacing:0.08em; margin:16px 2px 7px; text-transform:uppercase;}
  .match-row{display:flex; align-items:center; padding:11px 12px; gap:8px;}
  .match-row + .match-row{border-top:1px solid var(--line);}
  .match-team{flex:1; min-width:0; font-size:14px; font-weight:500;}
  .match-team.right{text-align:right;}
  .match-score{display:flex; align-items:center; gap:6px; flex-shrink:0;}
  .match-meta{font-size:10px; color:var(--chalk-dim); padding:0 12px 10px; margin-top:-4px;}

  /* ---------- Pills (grupos / fases) ---------- */
  .pillbar{display:flex; gap:7px; overflow-x:auto; padding:2px 2px 4px; scrollbar-width:none;}
  .pillbar::-webkit-scrollbar{display:none;}
  .pill{flex-shrink:0; padding:7px 14px; border-radius:20px; background:var(--turf); border:1px solid var(--line); color:var(--chalk-dim); font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:0.04em; cursor:pointer;}
  .pill.active{background:var(--amber); border-color:var(--amber); color:#1a1304; font-weight:600;}

  table.standings{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.standings th{font-weight:500; color:var(--chalk-dim); font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em; padding:8px 6px; text-align:center; border-bottom:1px solid var(--line);}
  table.standings th:first-child, table.standings td:first-child{text-align:left; padding-left:12px;}
  table.standings td{padding:9px 6px; text-align:center; font-family:'JetBrains Mono',monospace;}
  table.standings td.team{font-family:'Inter',sans-serif; font-weight:600; text-align:left; font-size:13px;}
  table.standings tr{border-bottom:1px solid var(--line);}
  table.standings tr:last-child{border-bottom:none;}
  table.standings tr.q1 td.team::before{content:"●"; color:var(--win); margin-right:6px; font-size:8px;}
  table.standings tr.q2 td.team::before{content:"●"; color:var(--amber); margin-right:6px; font-size:8px;}
  .legend{font-size:10.5px; color:var(--chalk-dim); padding:8px 12px 0;}

  .phase-block .section-title{margin-top:20px;}
  .empty-note{color:var(--chalk-dim); font-size:12.5px; padding:14px; text-align:center; font-style:italic;}

  .bombo-card .bombo-head{display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:var(--turf-soft);}
  .bombo-head .name{font-family:'Oswald',sans-serif; font-size:14px; letter-spacing:0.05em;}
  .bombo-row{display:flex; align-items:center; justify-content:space-between; padding:9px 14px;}
  .bombo-row + .bombo-row{border-top:1px solid var(--line);}
  .bombo-pos{font-family:'JetBrains Mono',monospace; color:var(--chalk-dim); font-size:11px; width:16px;}

  .intro-card{padding:14px; font-size:12.5px; color:var(--chalk-dim); line-height:1.5;}
  .intro-card b{color:var(--chalk);}

  /* ---------- Bottom nav ---------- */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    background:rgba(11,31,20,0.92); backdrop-filter:blur(10px) saturate(140%);
    border-top:1px solid var(--line);
    display:flex; padding-bottom:var(--safe-bottom);
  }
  nav.tabbar button{
    flex:1; background:none; border:none; color:var(--chalk-dim);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:10px 2px 8px; font-family:'Inter',sans-serif; font-size:10px; font-weight:600;
    letter-spacing:0.02em;
  }
  nav.tabbar button svg{width:21px; height:21px; stroke:var(--chalk-dim); fill:none; stroke-width:1.7;}
  nav.tabbar button.active{color:var(--amber);}
  nav.tabbar button.active svg{stroke:var(--amber);}

  .loading, .err{padding:60px 20px; text-align:center; color:var(--chalk-dim); font-size:13px;}
  .err b{color:var(--loss); display:block; margin-bottom:6px; font-family:'Oswald',sans-serif;}
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand">
      <h1>Mundial 2026</h1>
      <div class="sub">La Bolilla</div>
    </div>
    <div class="updated-pill"><span class="dot"></span><span id="updated-text">cargando…</span></div>
  </div>
</header>

<main id="app">
  <div class="loading" id="loading">Cargando datos del torneo…</div>
</main>

<nav class="tabbar" id="tabbar" style="display:none;">
  <button data-view="ranking" class="active">
    <svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4Z"/><path d="M7 6H4a1 1 0 0 0-1 1c0 3 2 5 4.5 5M17 6h3a1 1 0 0 1 1 1c0 3-2 5-4.5 5"/></svg>
    Ranking
  </button>
  <button data-view="partidos">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7.5 9 10l1 4h4l1-4-3-2.5ZM12 3v4.5M5.5 8 9 10M19 8l-3.5 2M7 18l2.5-4M17 18l-2.5-4"/></svg>
    Partidos
  </button>
  <button data-view="grupos">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
    Grupos
  </button>
  <button data-view="eliminacion">
    <svg viewBox="0 0 24 24"><path d="M4 5h4v3H4zM4 16h4v3H4zM16 9.5h4v3h-4z"/><path d="M8 6.5h3v8.5a2 2 0 0 0 2 2h1M8 17.5h3v-3"/></svg>
    Eliminatoria
  </button>
  <button data-view="bombos">
    <svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="17" height="17" rx="3"/><circle cx="8.3" cy="8.3" r="1.1" fill="currentColor" stroke="none"/><circle cx="15.7" cy="8.3" r="1.1" fill="currentColor" stroke="none"/><circle cx="8.3" cy="15.7" r="1.1" fill="currentColor" stroke="none"/><circle cx="15.7" cy="15.7" r="1.1" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.1" fill="currentColor" stroke="none"/></svg>
    Bombos
  </button>
</nav>

<script>
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => Array.from(el.querySelectorAll(sel));

let DATA = null;
let grupoActivo = null;

function scoreClass(n){
  if(n > 0) return 'pos';
  if(n < 0) return 'neg';
  return 'zero';
}
function fmtPts(n){ return (n>0?'+':'') + n; }

function fmtFecha(iso){
  if(!iso) return '';
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const [y,m,d] = iso.split('-').map(Number);
  return `${d} ${meses[m-1]}`;
}

function tiempoRelativo(iso){
  try{
    const diffMs = Date.now() - new Date(iso).getTime();
    const min = Math.round(diffMs/60000);
    if(min < 1) return 'justo ahora';
    if(min < 60) return `hace ${min} min`;
    const h = Math.round(min/60);
    if(h < 24) return `hace ${h} h`;
    const d = Math.round(h/24);
    return `hace ${d} d`;
  }catch(e){ return ''; }
}

async function cargar(){
  try{
    const res = await fetch('data.json', {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    grupoActivo = Object.keys(DATA.grupos)[0];
    $('#updated-text').textContent = tiempoRelativo(DATA.meta.actualizado);
    $('#tabbar').style.display = 'flex';
    render();
  }catch(e){
    $('#app').innerHTML = `<div class="err"><b>No se pudo cargar data.json</b>${e.message}<br><br>Comprueba que el fichero existe junto a index.html y que la última ejecución del workflow terminó bien.</div>`;
  }
}

function render(){
  const app = $('#app');
  app.innerHTML = `
    <div class="view active" id="view-ranking"></div>
    <div class="view" id="view-partidos"></div>
    <div class="view" id="view-grupos"></div>
    <div class="view" id="view-eliminacion"></div>
    <div class="view" id="view-bombos"></div>
  `;
  renderRanking();
  renderPartidos();
  renderGrupos();
  renderEliminacion();
  renderBombos();

  $$('nav.tabbar button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      $$('nav.tabbar button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      $$('.view').forEach(v=>v.classList.remove('active'));
      $('#view-' + btn.dataset.view).classList.add('active');
      window.scrollTo({top:0, behavior:'instant'});
    });
  });
}

function renderRanking(){
  const el = $('#view-ranking');
  const rows = DATA.ranking.map(f=>{
    const cls = f.pos<=3 ? 'top3' : '';
    return `
    <details class="rank-row">
      <summary>
        <div class="rank-num ${cls}">${f.pos}</div>
        <div class="rank-team">
          <div class="name">${f.equipo}</div>
          <div class="tags">${f.bombo} · Grupo ${f.grupo}</div>
        </div>
        <div class="scorebox ${scoreClass(f.puntos_totales)}">${fmtPts(f.puntos_totales)}</div>
      </summary>
      <div class="breakdown">
        <div class="breakdown-grid">
          <div>Goles a favor / en contra</div><div>${f.gf} / ${f.gc}</div>
          <div>Amarillas / 2ª amarilla / Rojas</div><div>${f.ta} / ${f.doblea} / ${f.rd}</div>
          <div>Penaltis fallados / parados</div><div>${f.penfall} / ${f.penpar}</div>
          <div>Bonus resultados de partido</div><div>${fmtPts(f.bonus_resultado)}</div>
          <div>Bonus posición de grupo</div><div>${fmtPts(f.bonus_grupo)}</div>
          <div>Bonus rondas superadas</div><div>${fmtPts(f.bonus_ronda)}</div>
          ${f.premio_final ? `<div>Premio final</div><div>${fmtPts(f.premio_final)}</div>` : ''}
          ${f.goleador ? `<div>Máximo goleador</div><div>${fmtPts(f.goleador)}</div>` : ''}
        </div>
      </div>
    </details>`;
  }).join('');

  el.innerHTML = `
    <div class="section-title">Clasificación general · ${DATA.ranking.length} selecciones</div>
    <div class="card">${rows}</div>
  `;
}

function renderPartidos(){
  const el = $('#view-partidos');
  if(!DATA.partidos.length){
    el.innerHTML = `<div class="intro-card card">Todavía no hay partidos jugados registrados.</div>`;
    return;
  }
  const porFecha = {};
  DATA.partidos.forEach(p=>{
    (porFecha[p.fecha] ||= []).push(p);
  });
  const fechas = Object.keys(porFecha).sort().reverse();

  el.innerHTML = fechas.map(fecha=>{
    const filas = porFecha[fecha].map(matchRow).join('');
    return `<div class="date-head">${fmtFecha(fecha)}</div><div class="card">${filas}</div>`;
  }).join('');
}

function matchRow(p){
  const faseTxt = p.grupo ? `Grupo ${p.grupo}` : p.fase;
  const tarjetas = (loc) => {
    const ta = loc ? p.ta_local : p.ta_visit;
    const da = loc ? p.doblea_local : p.doblea_visit;
    const rd = loc ? p.rd_local : p.rd_visit;
    let s = '';
    if(ta) s += `🟨${ta>1?ta:''} `;
    if(da) s += `🟨🟥${da>1?da:''} `;
    if(rd) s += `🟥${rd>1?rd:''} `;
    return s;
  };
  return `
    <div class="match-row">
      <div class="match-team">${p.local}</div>
      <div class="match-score">
        <span class="scorebox amber">${p.gf_local}</span>
        <span style="color:var(--chalk-dim)">–</span>
        <span class="scorebox amber">${p.gf_visit}</span>
      </div>
      <div class="match-team right">${p.visitante}</div>
    </div>
    <div class="match-meta"><span class="tag">${faseTxt}</span>${tarjetas(true) || tarjetas(false) ? `<span style="margin-left:4px;">${tarjetas(true)}${tarjetas(false)}</span>` : ''}</div>
  `;
}

function renderGrupos(){
  const el = $('#view-grupos');
  const letras = Object.keys(DATA.grupos);

  function pintar(){
    const g = DATA.grupos[grupoActivo];
    const filasTabla = g.tabla.map(f=>{
      const qcls = f.pos===1 ? 'q1' : (f.pos===2 ? 'q2' : '');
      return `<tr class="${qcls}">
        <td class="team">${f.equipo}</td>
        <td>${f.pj}</td><td>${f.pg}</td><td>${f.pe}</td><td>${f.pp}</td>
        <td>${f.gf}</td><td>${f.gc}</td><td>${f.dg>0?'+':''}${f.dg}</td>
        <td><b>${f.pts}</b></td>
      </tr>`;
    }).join('');

    const partidos = g.partidos.length
      ? `<div class="card" style="margin-top:10px;">${g.partidos.map(matchRow).join('')}</div>`
      : `<div class="empty-note">Aún no se ha jugado ningún partido de este grupo.</div>`;

    $('#grupo-contenido').innerHTML = `
      <div class="card">
        <table class="standings">
          <thead><tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr></thead>
          <tbody>${filasTabla}</tbody>
        </table>
      </div>
      <div class="legend"><span style="color:var(--win)">●</span> 1º clasifica directo &nbsp; <span style="color:var(--amber)">●</span> 2º clasifica directo</div>
      <div class="section-title">Partidos del grupo</div>
      ${partidos}
    `;
  }

  el.innerHTML = `
    <div class="pillbar" id="grupo-pills">
      ${letras.map(l=>`<div class="pill ${l===grupoActivo?'active':''}" data-g="${l}">Grupo ${l}</div>`).join('')}
    </div>
    <div id="grupo-contenido"></div>
  `;

  $$('#grupo-pills .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      grupoActivo = p.dataset.g;
      $$('#grupo-pills .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      pintar();
    });
  });

  pintar();
}

function renderEliminacion(){
  const el = $('#view-eliminacion');
  const fases = Object.keys(DATA.eliminacion);

  el.innerHTML = `
    <div class="intro-card card" style="margin-bottom:4px;">La fase de eliminación directa se va completando aquí en cuanto Wikipedia publica resultados. Los cruces sin jugar todavía no aparecen.</div>
    ${fases.map(f=>{
      const partidos = DATA.eliminacion[f];
      const bloque = partidos.length
        ? `<div class="card">${partidos.map(matchRow).join('')}</div>`
        : `<div class="empty-note">Sin resultados todavía</div>`;
      return `<div class="phase-block"><div class="section-title">${f}</div>${bloque}</div>`;
    }).join('')}
  `;
}

function renderBombos(){
  const el = $('#view-bombos');
  const nombres = Object.keys(DATA.bombos);
  el.innerHTML = `
    <div class="section-title">Bombos del sorteo · puntos actuales</div>
    ${nombres.map(nombre=>{
      const equipos = DATA.bombos[nombre];
      const filas = equipos.map((e,i)=>`
        <div class="bombo-row">
          <div style="display:flex; align-items:center; gap:9px;">
            <span class="bombo-pos">${i+1}</span>
            <span style="font-weight:600; font-size:13.5px;">${e.equipo}</span>
          </div>
          <span class="scorebox ${scoreClass(e.puntos)}" style="min-width:auto;">${fmtPts(e.puntos)}</span>
        </div>`).join('');
      return `<div class="card bombo-card" style="margin-bottom:10px;">
        <div class="bombo-head"><span class="name">${nombre}</span></div>
        ${filas}
      </div>`;
    }).join('')}
  `;
}

cargar();
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
